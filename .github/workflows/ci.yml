name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test core package
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Tool versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Swift tests
        run: swift test --package-path CleanMacCore

  build:
    name: Build macOS app
    runs-on: macos-26
    timeout-minutes: 30
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Debug app
        run: |
          xcodebuild \
            -project CleanMac.xcodeproj \
            -scheme CleanMac \
            -configuration Debug \
            -derivedDataPath build/XcodeData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=""

  release-artifact:
    name: Build unsigned release package
    runs-on: macos-26
    timeout-minutes: 30
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Package Release app
        run: ./script/package_release.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanMac-unsigned-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
